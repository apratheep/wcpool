<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Leaderboard — World Cup 2026 Pool</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --green:#1D9E75;--green-bg:#E1F5EE;--green-text:#085041;--green-border:#A3DEC8;
  --blue:#2E86DE;--blue-bg:#E6F1FB;--blue-text:#0C447C;
  --amber:#C07A14;--amber-bg:#FEF3DC;--amber-text:#5C3800;--amber-border:#F0C070;
  --gold:#F5A623;--gold-bg:#FEF6E4;
  --ink:#111827;--ink2:#4B5563;--ink3:#9CA3AF;
  --surface:#FFFFFF;--surface2:#F7F8FA;
  --border:#E5E7EB;--border2:#D1D5DB;
  --radius:14px;--radius-sm:9px;
  --shadow:0 1px 3px rgba(0,0,0,0.07),0 4px 12px rgba(0,0,0,0.05);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:var(--surface2);color:var(--ink);-webkit-font-smoothing:antialiased}

.banner{
  background:linear-gradient(135deg,#0A2540 0%,#1a3f6f 60%,#0e5c42 100%);
  padding:1.25rem 1.25rem 1.1rem;text-align:center;position:relative;overflow:hidden;
}
.banner::before{content:'🏆';font-size:110px;opacity:0.07;position:absolute;right:-10px;top:-20px;line-height:1;pointer-events:none}
.banner-eyebrow{font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,0.5);margin-bottom:4px}
.banner h1{font-size:20px;font-weight:600;color:#fff;letter-spacing:-0.3px}
.banner p{font-size:13px;color:rgba(255,255,255,0.6);margin-top:3px}

.page{max-width:600px;margin:0 auto;padding:1.1rem 1rem 4rem}

.refresh-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:0.9rem}
.refresh-row h2{font-size:15px;font-weight:600;letter-spacing:-0.2px}
.btn-refresh{
  font-size:12px;padding:7px 14px;border-radius:var(--radius-sm);
  border:1.5px solid var(--border2);background:var(--surface);
  color:var(--ink2);cursor:pointer;font-family:inherit;font-weight:500;
  transition:all 0.15s;
}
.btn-refresh:hover{background:var(--surface2)}

/* ── NO RESULTS NOTICE ── */
.notice{
  font-size:13px;color:var(--amber-text);
  padding:10px 14px;background:var(--amber-bg);
  border-radius:var(--radius-sm);border-left:3px solid var(--amber);
  margin-bottom:1rem;font-weight:500;
}

/* ── LEADER CARD (top 3) ── */
.podium{display:flex;flex-direction:column;gap:8px;margin-bottom:1rem}
.podium-card{
  background:var(--surface);
  border:1.5px solid var(--border);
  border-radius:var(--radius);
  padding:0.9rem 1rem;
  display:flex;align-items:center;gap:12px;
  box-shadow:var(--shadow);
  position:relative;overflow:hidden;
}
.podium-card.rank-1{border-color:#F5A623;background:linear-gradient(135deg,#FFFBF0,#FFF)}
.podium-card.rank-2{border-color:#C0C8D8}
.podium-card.rank-3{border-color:#D4A574}

.pos-circle{
  width:34px;height:34px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:15px;font-weight:700;flex-shrink:0;
}
.pos-1{background:#F5A623;color:#fff}
.pos-2{background:#8B9BBF;color:#fff}
.pos-3{background:#C07A50;color:#fff}
.pos-n{background:var(--surface2);color:var(--ink2);font-size:13px}

.player-info{flex:1;min-width:0}
.player-name{font-size:15px;font-weight:600;letter-spacing:-0.2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.player-champ{font-size:12px;color:var(--ink2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.pts-chip{
  font-size:15px;font-weight:700;
  padding:5px 12px;border-radius:20px;
  flex-shrink:0;
}
.pts-leader{background:var(--green-bg);color:var(--green-text);border:1px solid var(--green-border)}
.pts-normal{background:var(--blue-bg);color:var(--blue-text)}
.pts-none{background:var(--surface2);color:var(--ink3);font-size:13px;font-weight:500}

/* ── REST OF THE TABLE ── */
.rest-table{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
.tbl-row{
  display:flex;align-items:center;gap:10px;
  padding:10px 14px;border-bottom:1px solid var(--border);
}
.tbl-row:last-child{border-bottom:none}
.tbl-row .pos{width:28px;text-align:center;font-size:13px;font-weight:600;color:var(--ink3);flex-shrink:0}
.tbl-row .name{flex:1;font-size:13px;font-weight:500;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tbl-row .champ{font-size:12px;color:var(--ink2);width:100px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tbl-row .tb{font-size:12px;color:var(--ink3);width:36px;text-align:center}
.tbl-row .pts{font-size:13px;font-weight:600;width:54px;text-align:right;flex-shrink:0}

/* ── TABLE HEADER ── */
.tbl-header{
  display:flex;align-items:center;gap:10px;
  padding:7px 14px;background:var(--surface2);
  border-bottom:1.5px solid var(--border);
  font-size:10px;font-weight:600;color:var(--ink3);
  text-transform:uppercase;letter-spacing:0.7px;
}
.tbl-header .pos{width:28px}
.tbl-header .name{flex:1}
.tbl-header .champ{width:100px}
.tbl-header .tb{width:36px;text-align:center}
.tbl-header .pts{width:54px;text-align:right}

.loading{text-align:center;padding:3rem 1rem;color:var(--ink3);font-size:14px}
.empty{text-align:center;padding:3rem 1rem;color:var(--ink3);font-size:14px}

.updated{font-size:11px;color:var(--ink3);text-align:center;margin-top:1rem}
</style>
</head>
<body>

<div class="banner">
  <div class="banner-eyebrow">FIFA World Cup 2026</div>
  <h1>Pool Leaderboard</h1>
  <p id="subtitle">Live standings</p>
</div>

<div class="page">
  <div class="refresh-row">
    <h2>Standings</h2>
    <button class="btn-refresh" onclick="load()">↻ Refresh</button>
  </div>
  <div id="board"><div class="loading">Loading standings…</div></div>
  <div class="updated" id="updated-at"></div>
</div>

<script>
// ── CONFIG ──────────────────────────────────────────────
const POOL_ID = new URLSearchParams(window.location.search).get('pool')
  || (window.location.pathname.split('/').filter(Boolean)[0] || null);
const TABLE = POOL_ID ? `pool_entries_${POOL_ID}` : 'pool_entries_work';
const SUPABASE_URL = 'https://aboywfahjokhguxxpxrl.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_P-Rblc8Ma-GOkVC2TLEkIA_MJGss7BD';

// ── POINTS TABLE (must match index.html) ─────────────────
const POINTS = {groups:1, third:1, r32:2, r16:2, qf:3, sf:4, '3rd':4, final:6};

// ── SCORING ENGINE ───────────────────────────────────────
// Scores a single entry's picks against the saved results object.
// Each field in `results` may be absent/null if that stage hasn't been entered yet.
function scoreEntry(picks, res) {
  let pts = 0;
  if (!res || !picks) return pts;

  // Group stage — 1pt per correct 1st or 2nd
  Object.entries(res.groupPicks || {}).forEach(([g, r]) => {
    if (r.first  && picks.groupPicks?.[g]?.first  === r.first)  pts += POINTS.groups;
    if (r.second && picks.groupPicks?.[g]?.second === r.second) pts += POINTS.groups;
  });

  // Best 8 third-place — 1pt each
  (res.thirdPicks || []).forEach(t => {
    if (t && picks.thirdPicks?.includes(t)) pts += POINTS.third;
  });

  // Knockout arrays (r32/r16/qf/sf)
  [
    {rk:'r32Picks', pk:'r32Picks', stage:'r32'},
    {rk:'r16Picks', pk:'r16Picks', stage:'r16'},
    {rk:'qfPicks',  pk:'qfPicks',  stage:'qf'},
    {rk:'sfPicks',  pk:'sfPicks',  stage:'sf'},
  ].forEach(({rk, pk, stage}) => {
    (res[rk] || []).forEach((winner, j) => {
      if (winner && picks[pk]?.[j] === winner) pts += POINTS[stage];
    });
  });

  // Third-place match — 4pts
  if (res.pick3rd && picks.pick3rd === res.pick3rd) pts += POINTS['3rd'];

  // Final / champion — 6pts
  // Support both `pickFinal` (how index.html stores it) and `champion` (legacy key)
  const resChamp = res.pickFinal || res.champion;
  const playerChamp = picks.pickFinal || picks.champion;
  if (resChamp && playerChamp === resChamp) pts += POINTS.final;

  return pts;
}

// ── HELPERS ──────────────────────────────────────────────
function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function sbGet(path) {
  const r = await fetch(SUPABASE_URL + path, {
    headers: {
      'apikey': SUPABASE_ANON_KEY,
      'Authorization': 'Bearer ' + SUPABASE_ANON_KEY
    }
  });
  return r.json();
}

// ── MAIN LOAD ─────────────────────────────────────────────
async function load() {
  document.getElementById('board').innerHTML = '<div class="loading">Loading standings…</div>';
  document.getElementById('updated-at').textContent = '';
  try {
    const [entriesRaw, resultsRaw] = await Promise.all([
      sbGet(`/rest/v1/${TABLE}?select=id,name,created_at,picks&order=created_at.asc`),
      sbGet('/rest/v1/pool_results?select=data,updated_at&limit=1&order=updated_at.desc')
    ]);

    const results = (resultsRaw && resultsRaw[0] && resultsRaw[0].data) ? resultsRaw[0].data : {};
    const resultsUpdatedAt = resultsRaw?.[0]?.updated_at;

    // Deduplicate: keep only the earliest entry per lower-cased name
    const seen = new Set();
    const unique = [];
    (entriesRaw || []).forEach(e => {
      const k = e.name.toLowerCase();
      if (!seen.has(k)) { seen.add(k); unique.push(e); }
    });

    if (!unique.length) {
      document.getElementById('board').innerHTML = '<div class="empty">No entries yet — check back soon.</div>';
      return;
    }

    // Score everyone
    const goalTotal = parseInt(results._goalTotal) || 0;
    const scored = unique.map(e => ({
      ...e,
      pts: scoreEntry(e.picks || {}, results),
      tb: parseInt(e.picks?.tiebreak) || 0,
      champ: e.picks?.pickFinal || e.picks?.champion || null
    })).sort((a, b) =>
      b.pts - a.pts ||
      Math.abs(a.tb - goalTotal) - Math.abs(b.tb - goalTotal)
    );

    const hasResults = Object.values(results).some(v =>
      v && (Array.isArray(v) ? v.some(Boolean) : (typeof v === 'object' ? Object.values(v).some(Boolean) : !!v))
    );

    document.getElementById('subtitle').textContent =
      hasResults ? `${unique.length} participants` : `${unique.length} participants · Results pending`;

    renderBoard(scored, hasResults);

    if (resultsUpdatedAt) {
      const d = new Date(resultsUpdatedAt);
      document.getElementById('updated-at').textContent =
        'Scores last updated ' + d.toLocaleDateString(undefined, {month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
    }
  } catch(e) {
    document.getElementById('board').innerHTML = '<div class="empty">Failed to load — please try refreshing.</div>';
    console.error(e);
  }
}

function renderBoard(scored, hasResults) {
  const top3 = scored.slice(0, 3);
  const rest  = scored.slice(3);

  let html = '';

  if (!hasResults) {
    html += `<div class="notice">⏳ Results haven't been entered yet — standings show all 0 points until the tournament begins.</div>`;
  }

  // ── Podium (top 3) ────────────────────────────────────
  html += '<div class="podium">';
  top3.forEach((row, i) => {
    const pos = i + 1;
    const rankClass = pos === 1 ? 'rank-1' : pos === 2 ? 'rank-2' : 'rank-3';
    const posClass  = pos === 1 ? 'pos-1'  : pos === 2 ? 'pos-2'  : 'pos-3';
    const posEmoji  = pos === 1 ? '🥇' : pos === 2 ? '🥈' : '🥉';
    const ptsClass  = hasResults ? (pos === 1 ? 'pts-leader' : 'pts-normal') : 'pts-none';
    const ptsLabel  = hasResults ? row.pts + ' pts' : '—';
    const champLabel = row.champ ? '🏆 ' + esc(row.champ) : 'No champion yet';
    html += `<div class="podium-card ${rankClass}">
      <div class="pos-circle ${posClass}">${posEmoji}</div>
      <div class="player-info">
        <div class="player-name">${esc(row.name)}</div>
        <div class="player-champ">${champLabel}</div>
      </div>
      <div class="pts-chip ${ptsClass}">${ptsLabel}</div>
    </div>`;
  });
  html += '</div>';

  // ── Rest of field ──────────────────────────────────────
  if (rest.length) {
    html += '<div class="rest-table">';
    html += `<div class="tbl-header">
      <div class="pos">#</div>
      <div class="name">Player</div>
      <div class="champ">Champion</div>
      <div class="tb">TB</div>
      <div class="pts">Pts</div>
    </div>`;
    rest.forEach((row, i) => {
      const pos = i + 4;
      const ptsLabel = hasResults ? row.pts : '—';
      html += `<div class="tbl-row">
        <div class="pos">${pos}</div>
        <div class="name">${esc(row.name)}</div>
        <div class="champ" title="${esc(row.champ||'')}">
          ${row.champ ? esc(row.champ) : '<span style="color:var(--ink3)">—</span>'}
        </div>
        <div class="tb" title="Tiebreak: ${row.tb||'—'}">${row.tb || '—'}</div>
        <div class="pts" style="color:${hasResults?'var(--blue-text)':'var(--ink3)'}">${ptsLabel}</div>
      </div>`;
    });
    html += '</div>';
  }

  document.getElementById('board').innerHTML = html;
}

// Auto-load on open
load();
</script>
</body>
</html>
